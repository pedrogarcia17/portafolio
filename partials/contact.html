<div class="contact-block">
  <h2>Contact Form</h2>

  <form action="contacto.php" method="POST">
    
    <div class="form-group">
      <input type="text" name="nombre" class="form-control" placeholder="Nombre" required>
    </div>

    <div class="form-group">
      <input type="email" name="correo" class="form-control" placeholder="Correo" required>
    </div>

    <div class="form-group">
      <input type="text" name="celular" class="form-control" placeholder="Celular (opcional)">
    </div>

    <div class="form-group">
      <textarea name="mensaje" class="form-control" rows="5" placeholder="Mensaje" required></textarea>
    </div>

    <div class="form-group">
      <button type="submit" class="btn btn-common btn-lg">
        Enviar mensaje
      </button>
    </div>

  </form>
</div>
